function obsah() {
var loc
loc = top.frames.main.document.location.href
delka = loc.length
od = loc.lastIndexOf("/")
kam = loc.lastIndexOf("#")
if (kam==-1) strih = loc.substring(od+1,delka)
else strih = loc.substring(od+1,kam)

if (strih.indexOf("ot")!=-1 && strih!='othelp.htm' || strih=='start.htm' || strih=='vysledek.htm' || strih=='uvod.htm' ) alert('Nejste uvnitř žádné kapitoly !!')
else {
var soub=top.frames[2].soubor
top.frames[2].document.location=soub+'#obs'
}
}


function cil() {
var loc
loc = top.frames.main.document.location.href
delka = loc.length
od = loc.lastIndexOf("/")
kam = loc.lastIndexOf("#")
if (kam==-1) strih = loc.substring(od+1,delka)
else strih = loc.substring(od+1,kam)

if (strih.indexOf("ot")!=-1 || strih=='start.htm' || strih=='vysledek.htm') open("othelp.htm","DisplayWindow","toolbar=no,directories=no,menubar=no, width=540, height=400,scrollbars=no, resizable=yes" );
else{
if (strih.indexOf("cvic")!=-1) open("cvichelp.htm","DisplayWindow","toolbar=no,directories=no,menubar=no, width=550, height=450,scrollbars=yes, resizable=yes" );
else {
if (strih=='prevody.htm' || strih=='operace.htm') open("pochelp.htm","DisplayWindow","toolbar=no,directories=no,menubar=no, width=500, height=400,scrollbars=yes, resizable=yes" );
else {
if (strih=='uvod.htm') top.frames.main.document.location.href="helpikie.htm"
else {
if (strih.indexOf("test")!=-1)open( "tehelp.htm","DisplayWindow","toolbar=no,directories=no,menubar=no, width=550, height=450, scrollbars=yes, resizable=yes" );
else  open("ovlhelp.htm","DisplayWindow","toolbar=no,directories=no,menubar=no, width=640, height=480,scrollbars=yes, resizable=yes" );
}
}
}
}
}
